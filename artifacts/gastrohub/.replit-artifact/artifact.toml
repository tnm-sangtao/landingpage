kind = "web"
previewPath = "/"
title = "GastroHub"
version = "1.0.0"
id = "artifacts/gastrohub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24827

[services.development]
run = "pnpm --filter @workspace/gastrohub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gastrohub", "run", "build" ]
publicDir = "artifacts/gastrohub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24827"
BASE_PATH = "/"
